<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Крымский рюкзачок</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e5a1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            padding: 16px;
        }
        .game {
            max-width: 900px;
            width: 100%;
            background: #fdf5e6;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 10px 30px black;
        }
        .header {
            background: #3d2a1a;
            padding: 16px;
            text-align: center;
            color: #ffefcf;
            border-bottom: 3px solid #d4a373;
        }
        .header h1 { font-size: 1.8rem; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding: 0 8px;
        }
        .score, .level {
            background: #f4e2b9;
            padding: 6px 18px;
            border-radius: 40px;
            color: #3d2a1a;
            font-weight: bold;
        }
        .content {
            padding: 24px;
            min-height: 450px;
        }
        .question-box {
            background: #fff5e8;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0c8a0;
        }
        .cat {
            background: #4a6a3b;
            color: white;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .diff {
            background: #d9b48b;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        .q-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 15px 0 10px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        .answer {
            background: #e7dfc8;
            border: 2px solid #c0aa7a;
            border-radius: 50px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .prefix {
            background: #b7a16e;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .correct { background: #a5d6a5 !important; border-color: #2e7d32 !important; }
        .wrong { background: #e6b8b8 !important; border-color: #c62828 !important; }
        .disabled { pointer-events: none; opacity: 0.6; }
        .feedback {
            background: #eeddbb;
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-next { background: #6f9e3f; color: white; }
        .btn-restart { background: #8b6946; color: white; }
        .btn-level2 { background: #9b59b6; color: white; }
        .end-screen { text-align: center; padding: 30px; }
        .end-screen h2 { font-size: 1.8rem; margin-bottom: 15px; }
        .final-score {
            background: #3d2a1a;
            color: #ffefcf;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 40px;
            font-size: 1.3rem;
            margin: 20px 0;
        }
        .map-area {
            background: #cbbd97;
            border-radius: 24px;
            padding: 16px;
        }
        .map-container {
            position: relative;
            width: 100%;
            background: #a8c9d9;
            border-radius: 20px;
            overflow: hidden;
        }
        .map-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .writers-panel {
            background: #e8dcc8;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
        }
        .writers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }
        .writer {
            background: #3498db;
            color: white;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: grab;
            display: inline-block;
        }
        .writer.matched { background: #27ae60; cursor: default; opacity: 0.7; }
        .attempts {
            background: #3d2a1a;
            color: #ffefcf;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .city-dot { fill: #e74c3c; stroke: white; stroke-width: 2; cursor: pointer; pointer-events: all; }
        .city-text { fill: #2c3e2b; font-size: 12px; font-weight: bold; text-anchor: middle; pointer-events: none; }
        .match-text { fill: #1e5a1e; font-size: 10px; font-weight: bold; text-anchor: middle; pointer-events: none; }
        @media (max-width: 600px) {
            .city-text { font-size: 9px; }
            .match-text { font-size: 8px; }
            .writer { padding: 6px 12px; font-size: 0.7rem; }
            .q-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="header">
        <h1>🏕️ КРЫМСКИЙ РЮКЗАЧОК 🎒</h1>
        <div class="stats">
            <div class="score">🎯 Очки: <span id="scoreSpan">0</span></div>
            <div class="level" id="levelSpan">Уровень 1</div>
        </div>
    </div>
    <div class="content" id="content"></div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const ATTEMPTS_TOTAL = 10;

    const questions = [
        { text: "Что такое «трейл» в туризме?", options: ["Спецобувь", "Маркированная тропа", "Палатка", "Рюкзак"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Самая известная тропа в Крыму?", options: ["Боткинская", "Царская", "Голицынская", "Штангеевская"], correct: 2, cat: "Туризм", diff: 2 },
        { text: "Что обязательно в аптечке?", options: ["Только бинт", "Антисептик, обезбол, бинты", "Только от головы", "Ничего"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Как разводить костёр?", options: ["Где угодно", "На старом кострище", "Под деревом", "У воды"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Сколько воды брать в день?", options: ["0.5 л", "1-1.5 л", "2-3 л", "5 л"], correct: 2, cat: "Туризм", diff: 2 },
        { text: "Что такое рапа?", options: ["Водоросль", "Солевой раствор", "Грязь", "Река"], correct: 1, cat: "Туризм", diff: 2 },
        { text: "Самая длинная пещера Крыма?", options: ["Мраморная", "Кизил-Коба", "Эмине-Баир", "МАН"], correct: 1, cat: "Туризм", diff: 2 },
        { text: "Что такое яйла?", options: ["Река", "Плоскогорье", "Ущелье", "Лес"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Обувь для гор?", options: ["Кроссовки", "Сланцы", "Треккинговые", "Сапоги"], correct: 2, cat: "Туризм", diff: 1 },
        { text: "«Не оставляй следов» — это?", options: ["Закапывать мусор", "Забирать мусор", "Ходить по асфальту", "Не фоткать"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Самый полноводный водопад?", options: ["Учан-Су", "Джур-Джур", "Головкинского", "Су-Учхан"], correct: 1, cat: "Туризм", diff: 2 },
        { text: "Где Большой каньон?", options: ["Ай-Петри", "Кара-Даг", "Демерджи", "Чатыр-Даг"], correct: 0, cat: "Туризм", diff: 2 },
        { text: "Треккинг — это?", options: ["Сплав", "Пеший поход", "Скалы", "Велик"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Растение, которое нельзя трогать?", options: ["Шиповник", "Ясенец", "Лаванда", "Тимьян"], correct: 1, cat: "Туризм", diff: 3 },
        { text: "Что такое система у туристов?", options: ["Палатка", "Страховка", "Спальник", "Коврик"], correct: 1, cat: "Туризм", diff: 2 },
        { text: "Что в Севастополе?", options: ["Ласточкино гнездо", "Херсонес", "Воронцовский дворец", "Генуэзская крепость"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Если заблудился?", options: ["Бежать", "Остаться на месте, звонить 112", "Спрятаться", "Идти к реке"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Заповедник с вулканом?", options: ["Крымский", "Карадагский", "Ялтинский", "Казантипский"], correct: 1, cat: "Туризм", diff: 2 },
        { text: "Зачем компас?", options: ["Смотреть время", "Ориентироваться", "Ловить рыбу", "Измерять высоту"], correct: 1, cat: "Туризм", diff: 1 },
        { text: "Самый высокий водопад?", options: ["Джур-Джур", "Учан-Су", "Головкинского", "Суаткан"], correct: 1, cat: "Туризм", diff: 2 }
    ];

    const writersList = [
        { name: "Антон Чехов", city: "Ялта", matched: false },
        { name: "Александр Пушкин", city: "Бахчисарай", matched: false },
        { name: "Иван Айвазовский", city: "Феодосия", matched: false },
        { name: "Александр Грин", city: "Феодосия", matched: false },
        { name: "Максимилиан Волошин", city: "Коктебель", matched: false },
        { name: "Леся Украинка", city: "Ялта", matched: false },
        { name: "Александр Куприн", city: "Ялта", matched: false },
        { name: "Лев Толстой", city: "Севастополь", matched: false },
        { name: "Константин Паустовский", city: "Старый Крым", matched: false }
    ];

    // Координаты городов (в % от ширины/высоты картинки)
    const cities = [
        { name: "Бахчисарай", x: 36, y: 42 },
        { name: "Севастополь", x: 24, y: 60 },
        { name: "Ялта", x: 48, y: 70 },
        { name: "Коктебель", x: 76, y: 58 },
        { name: "Старый Крым", x: 84, y: 48 },
        { name: "Феодосия", x: 90, y: 56 }
    ];

    // ГОТОВЫЙ BASE64 КАРТЫ КРЫМА (прозрачный фон, чёрный контур) 
    const CRIMEA_BASE64 = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0MDAgMjUwIj48cGF0aCBmaWxsPSIjZThmMGQwIiBzdHJva2U9IiMyYzNlMmIiIHN0cm9rZS13aWR0aD0iMiIgZD0iTTc4IDM0IEw3MyA0MCBMNjggNDggTDYzIDU2IEw1OSA2NCBMNTYgNzIgTDU0IDgwIEw1MyA4OCBMNTMgOTYgTDU0IDEwNCBMNTYgMTEyIEw1OSAxMjAgTDYzIDEyNyBMNjggMTMzIEw3NCAxMzggTDgxIDE0MiBMODkgMTQ0IEw5NyAxNDQgTDEwNSAxNDIgTDExMiAxMzggTDExOSAxMzIgTDEyNiAxMjUgTDEzMiAxMTggTDEzOCAxMTEgTDE0NCAxMDUgTDE1MCAxMDAgTDE1NiA5NiBMMTYyIDkzIEwxNjggOTEgTDE3NCA5MCBMMTgwIDkwIEwxODYgOTEgTDE5MiA5MyBMMTk4IDk2IEwyMDQgMTAwIEwyMTAgMTA1IEwyMTYgMTExIEwyMjIgMTE3IEwyMjggMTIzIEwyMzQgMTI5IEwyNDAgMTM0IEwyNDYgMTM4IEwyNTIgMTQxIEwyNTggMTQyIEwyNjQgMTQxIEwyNjkgMTM4IEwyNzQgMTMzIEwyNzkgMTI3IEwyODMgMTIwIEwyODcgMTEzIEwyOTEgMTA2IEwyOTUgOTkgTDI5OSA5MyBMMzAzIDg4IEwzMDcgODQgTDMxMSA4MiBMMzE1IDgxIEwzMTkgODIgTDMyMyA4NSBMMzI2IDkwIEwzMjggOTcgTDMyOSAxMDUgTDMyOCAxMTMgTDMyNSAxMjEgTDMyMCAxMjkgTDMxNCAxMzYgTDMwNyAxNDIgTDI5OSAxNDYgTDI5MSAxNDggTDI4MiAxNDggTDI3MyAxNDYgTDI2NCAxNDIgTDI1NSAxMzYgTDI0NiAxMjkgTDIzNyAxMjEgTDIyOCAxMTIgTDIxOSAxMDMgTDIxMCA5NSBMMjAxIDg4IEwxOTIgODMgTDE4MyA4MCBMMTc0IDc5IEwxNjUgODAgTDE1NiA4MyBMMTQ3IDg4IEwxMzggOTUgTDEyOSAxMDMgTDEyMCAxMTIgTDExMSAxMjEgTDEwMyAxMzAgTDk1IDEzOCBMODggMTQ0IEw4MSAxNDcgTDc1IDE0NyBMNzAgMTQ0IEw2NiAxMzkgTDYzIDEzMiBMNjEgMTI0IEw2MCAxMTUgTDYxIDEwNiBMNjMgOTcgTDY2IDg4IEw2OSA3OSBMNzIgNzAgTDc1IDYxIEw3OCA1MiBMODAgNDQgTDgwIDM2IFoiLz48cGF0aCBmaWxsPSJub25lIiBzdHJva2U9IiMyYzNlMmIiIHN0cm9rZS13aWR0aD0iMiIgZD0iTTMxNSA4MSBMMzI1IDc2IEwzMzMgNjkgTDMzOSA2MCBMMzQzIDUwIi8+PC9zdmc+";

    // ========== ЛОГИКА ИГРЫ ==========
    let gameState = {
        level: 1,
        score: 0,
        currentQIndex: 0,
        answered: false,
        selected: -1,
        feedback: "",
        fbType: "",
        level1Done: false,
        level2Done: false,
        level2Fail: false,
        currentQ: null,
        writers: [],
        attempts: ATTEMPTS_TOTAL
    };

    function init() {
        let shuffled = [...questions];
        for (let i = shuffled.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        gameState.questions = shuffled;
        gameState.currentQIndex = 0;
        gameState.score = 0;
        gameState.answered = false;
        gameState.selected = -1;
        gameState.feedback = "";
        gameState.level1Done = false;
        gameState.level2Done = false;
        gameState.level2Fail = false;
        gameState.level = 1;
        gameState.attempts = ATTEMPTS_TOTAL;
        gameState.writers = writersList.map(w => ({ ...w, matched: false }));
        updateScore();
        loadQuestion();
        render();
    }

    function loadQuestion() {
        if (gameState.currentQIndex < gameState.questions.length) {
            gameState.currentQ = { ...gameState.questions[gameState.currentQIndex] };
        } else {
            gameState.level1Done = true;
            gameState.currentQ = null;
        }
        gameState.answered = false;
        gameState.selected = -1;
        gameState.feedback = "";
    }

    function updateScore() {
        document.getElementById("scoreSpan").innerText = gameState.score;
        document.getElementById("levelSpan").innerText = gameState.level === 1 ? "Уровень 1" : "Уровень 2";
    }

    function handleAnswer(idx) {
        if (gameState.answered || gameState.level1Done || gameState.level !== 1) return;
        let q = gameState.currentQ;
        let correct = (idx === q.correct);
        gameState.answered = true;
        gameState.selected = idx;
        if (correct) {
            let points = q.diff * 10;
            gameState.score += points;
            gameState.feedback = `✅ Правильно! +${points} очков`;
            gameState.fbType = "correct";
        } else {
            gameState.feedback = `❌ Неправильно! Правильно: ${q.options[q.correct]}`;
            gameState.fbType = "wrong";
        }
        updateScore();
        render();
    }

    function nextQuestion() {
        if (!gameState.answered && !gameState.level1Done) return;
        gameState.currentQIndex++;
        if (gameState.currentQIndex < gameState.questions.length) {
            loadQuestion();
            render();
        } else {
            gameState.level1Done = true;
            render();
        }
    }

    function goToLevel2() {
        gameState.level = 2;
        gameState.level1Done = false;
        gameState.attempts = ATTEMPTS_TOTAL;
        render();
    }

    function restart() {
        init();
    }

    function matchWriter(writerName, cityName) {
        if (gameState.level2Fail || gameState.level2Done) return false;
        let writer = gameState.writers.find(w => w.name === writerName && !w.matched);
        if (!writer) return false;
        if (writer.city === cityName) {
            writer.matched = true;
            gameState.score += 15;
            updateScore();
            let allDone = gameState.writers.every(w => w.matched);
            if (allDone) gameState.level2Done = true;
            return { ok: true, msg: `✅ Правильно! ${writerName} → ${cityName} (+15)` };
        } else {
            gameState.attempts--;
            updateScore();
            if (gameState.attempts <= 0) {
                gameState.level2Fail = true;
                return { ok: false, msg: `💀 Игра окончена! Попытки кончились.` };
            }
            return { ok: false, msg: `❌ Неправильно! ${writerName} не связан с ${cityName}. Осталось попыток: ${gameState.attempts}` };
        }
    }

    function render() {
        let container = document.getElementById("content");
        if (!container) return;

        if (gameState.level === 1) {
            if (gameState.level1Done) {
                let canGo = gameState.score >= 150;
                container.innerHTML = `
                    <div class="end-screen">
                        <h2>🎉 УРОВЕНЬ 1 ПРОЙДЕН!</h2>
                        <div class="final-score">🏆 ${gameState.score} очков</div>
                        ${canGo ? '<button class="btn-level2" id="goL2Btn" style="padding:12px 30px;border-radius:40px;border:none;background:#9b59b6;color:white;font-weight:bold;cursor:pointer;">✨ ПЕРЕЙТИ НА УРОВЕНЬ 2 ✨</button>' : `<p style="color:#c0392b;">❌ Нужно 150 очков (у вас ${gameState.score})</p>`}
                        <div class="buttons"><button class="btn-restart" id="restartBtn1">🔄 Заново</button></div>
                    </div>
                `;
                if (canGo) document.getElementById("goL2Btn")?.addEventListener("click", goToLevel2);
                document.getElementById("restartBtn1")?.addEventListener("click", restart);
                return;
            }
            if (!gameState.currentQ) return;
            let q = gameState.currentQ;
            let letters = ["А","Б","В","Г"];
            let answersHtml = "";
            q.options.forEach((opt, i) => {
                let cls = "";
                if (gameState.answered) {
                    if (i === q.correct) cls = "correct";
                    else if (i === gameState.selected && i !== q.correct) cls = "wrong";
                    else cls = "disabled";
                }
                answersHtml += `<div class="answer ${cls}" data-idx="${i}"><span class="prefix">${letters[i]}</span><span>${opt}</span></div>`;
            });
            let stars = "⭐".repeat(q.diff);
            let fbHtml = gameState.feedback ? `<div class="feedback ${gameState.fbType}">${gameState.feedback}</div>` : "";
            let nextBtn = gameState.answered ? '<button class="btn-next" id="nextBtn">🎒 ДАЛЕЕ →</button>' : '<button class="btn-next" disabled style="opacity:0.5">👉 Сначала ответь</button>';
            container.innerHTML = `
                <div class="question-box">
                    <div><span class="cat">${q.cat}</span><span class="diff">⭐ Сложность ${q.diff} ${stars}</span></div>
                    <div class="q-text">${q.text}</div>
                </div>
                <div class="answers">${answersHtml}</div>
                ${fbHtml}
                <div class="buttons">${nextBtn}<button class="btn-restart" id="restartBtnL1">🔄 Заново</button></div>
            `;
            document.querySelectorAll(".answer").forEach(btn => {
                btn.addEventListener("click", () => { if (!gameState.answered && !gameState.level1Done) handleAnswer(parseInt(btn.dataset.idx)); });
            });
            document.getElementById("nextBtn")?.addEventListener("click", nextQuestion);
            document.getElementById("restartBtnL1")?.addEventListener("click", restart);
            return;
        }

        // Уровень 2
        if (gameState.level2Done) {
            container.innerHTML = `<div class="end-screen"><h2>🏆 ПОБЕДА!</h2><div class="final-score">⭐ ${gameState.score} очков</div><div class="buttons"><button class="btn-restart" id="restartWin">🔄 Сначала</button></div></div>`;
            document.getElementById("restartWin")?.addEventListener("click", restart);
            return;
        }
        if (gameState.level2Fail) {
            container.innerHTML = `<div class="end-screen"><h2 style="color:#c0392b;">💀 ПРОИГРЫШ</h2><div class="final-score">🏆 ${gameState.score} очков</div><div class="buttons"><button class="btn-restart" id="restartLose">🔄 Сначала</button></div></div>`;
            document.getElementById("restartLose")?.addEventListener("click", restart);
            return;
        }

        let writersHtml = "";
        gameState.writers.forEach(w => {
            if (!w.matched) writersHtml += `<div class="writer" draggable="true" data-writer="${w.name}">📖 ${w.name}</div>`;
        });

        // Группировка писателей по городам
        let cityMatches = {};
        gameState.writers.forEach(w => {
            if (w.matched) {
                if (!cityMatches[w.city]) cityMatches[w.city] = [];
                cityMatches[w.city].push(w.name);
            }
        });
        let matchedHtml = "";
        for (let city in cityMatches) {
            let c = cities.find(c => c.name === city);
            if (c) {
                cityMatches[city].forEach((name, idx) => {
                    matchedHtml += `<text class="match-text" x="${c.x}%" y="${c.y + 12 + idx * 14}%" text-anchor="middle">✓ ${name}</text>`;
                });
            }
        }

        let citiesHtml = "";
        cities.forEach(c => {
            citiesHtml += `<circle class="city-dot" cx="${c.x}%" cy="${c.y}%" r="7" data-city="${c.name}" />
                           <text class="city-text" x="${c.x}%" y="${c.y-10}%">${c.name}</text>`;
        });

        container.innerHTML = `
            <div class="attempts">🎯 ПОПЫТКИ: <span style="color:${gameState.attempts<=3?'#e74c3c':'#f39c12'}">${gameState.attempts}</span> / ${ATTEMPTS_TOTAL}</div>
            <div class="map-area">
                <div class="map-container">
                    <img class="map-image" src="${CRIMEA_BASE64}" alt="Карта Крыма" />
                    <svg class="map-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
                        ${citiesHtml}
                        ${matchedHtml}
                    </svg>
                </div>
            </div>
            <div class="writers-panel">
                <div class="writers-title">📚 ПЕРЕТАЩИТЕ ПИСАТЕЛЯ К ГОРОДУ</div>
                <div class="writers-list" id="writersList">${writersHtml}</div>
            </div>
            <div id="l2fb" class="feedback" style="margin-top:15px;">✨ Перетащите карточку на точку города</div>
            <div class="buttons"><button class="btn-restart" id="restartL2">🔄 Заново</button></div>
        `;

        // Drag & Drop
        let cards = document.querySelectorAll(".writer");
        let dots = document.querySelectorAll(".city-dot");
        cards.forEach(card => {
            card.setAttribute("draggable", "true");
            card.addEventListener("dragstart", e => e.dataTransfer.setData("text/plain", card.getAttribute("data-writer")));
        });
        dots.forEach(dot => {
            dot.addEventListener("dragover", e => e.preventDefault());
            dot.addEventListener("drop", e => {
                e.preventDefault();
                let writer = e.dataTransfer.getData("text/plain");
                let city = dot.getAttribute("data-city");
                let fb = document.getElementById("l2fb");
                let res = matchWriter(writer, city);
                if (fb) {
                    fb.innerHTML = res.msg;
                    fb.style.background = res.ok ? "#c8e6c9" : "#ffcdd2";
                    setTimeout(() => {
                        if (fb && !gameState.level2Done && !gameState.level2Fail) {
                            fb.innerHTML = "✨ Перетащите карточку на точку города";
                            fb.style.background = "#eeddbb";
                        }
                    }, 1500);
                }
                render();
            });
        });
        document.getElementById("restartL2")?.addEventListener("click", restart);
    }

    init();
</script>
</body>
</html>
